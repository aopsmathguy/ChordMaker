<!DOCTYPE html>
<html>
<head>
    <title>ChordMaker</title>
    <meta charset="utf-8">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        body {
            width: 760px;
            height: 600px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
            padding: 6px 8px;
        }
        h1 {
            margin: 4px 0;
            font-size: 18px;
            text-align: center;
        }
        button {
            width: 40px;
            height: 40px;
            margin: 4px;
            font-size: 18px;
            cursor: pointer;
        }
        input[type="number"] {
            width: 56px;
            height: 32px;
            margin: 4px;
            font-size: 14px;
        }
        input[type="color"] {
            width: 40px;
            height: 32px;
            margin: 4px;
            padding: 0;
            border: 1px solid #ccc;
        }
        .container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        #status {
            min-height: 14px;
            font-size: 12px;
            color: #888;
            text-align: center;
            flex-shrink: 0;
        }
        #preview {
            flex: 1 1 auto;
            min-height: 0;
            width: 100%;
            border: 1px solid #ccc;
            margin-top: 6px;
            box-sizing: border-box;
            background: #f8f8f8;
        }
    </style>
</head>
<body>
    <div class = "container">
        <h1>ChordMaker</h1>
    </div>
    <div class = "container">
        <button id="increase">+</button>
        <button id="decrease">-</button>
        <input type="number" id="columns" value="2" min="1" max="4">
        <input type="number" id="maxWidth" value="50" min="10" max="100">
        <input type="color" id="theme0" value="#ffffff">
        <input type="color" id="theme1" value="#000000">
        <input type="color" id="theme2" value="#ff0000">
        <button id="openTab" title="Open PDF in new tab">↗</button>
    </div>
    <div id="status"></div>
    <iframe id="preview"></iframe>
    <script src="popup.js"></script>
</body>
</html>
